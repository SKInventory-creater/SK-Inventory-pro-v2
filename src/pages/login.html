<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SK Inventory Pro - Login</title>

    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/login.css">
</head>

<body>

    <main class="login-page">

        <section class="login-card">

            <h1>SK Inventory Pro</h1>

            <p class="subtitle">
                Inventory Management System
            </p>

            <form id="loginForm">

                <div class="form-group">
                    <label for="email">
                        အီးမေးလ်
                    </label>

                    <input
                        type="email"
                        id="email"
                        placeholder="admin@example.com"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="password">
                        စကားဝှက်
                    </label>

                    <input
                        type="password"
                        id="password"
                        placeholder="********"
                        required
                    >
                </div>

                <button
                    type="submit"
                    id="loginButton"
                    class="login-btn">
                    ဝင်မည်
                </button>

            </form>

            <p id="errorMessage" class="error-message"></p>

        </section>

    </main>

    <script type="module" src="../js/auth.js"></script>

</body>
</html>
