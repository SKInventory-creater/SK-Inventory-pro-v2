<!DOCTYPE html>
<html lang="my">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Settings - SK Inventory Pro</title>

    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/settings.css">
</head>

<body>


<header class="topbar">

    <h1>
        Settings
    </h1>


    <button id="backBtn">
        ← ပြန်
    </button>

</header>



<main class="container">


<section class="card">


<h2>
    Account
</h2>


<div class="setting-item">

    <span>
        User Email
    </span>

    <strong id="userEmail">
        -
    </strong>

</div>


<button
    id="logoutBtn"
    class="danger-btn">

    Logout

</button>


</section>



<section class="card">


<h2>
    Cloud Backup
</h2>


<p>
    Data များကို Cloud တွင် သိမ်းဆည်းထားပါသည်။
</p>


<button
    id="backupBtn"
    class="primary-btn">

    Backup Now

</button>


<button
    id="restoreBtn"
    class="primary-btn">

    Restore Data

</button>


</section>



<section class="card">


<h2>
    App Information
</h2>


<div class="setting-item">

    <span>
        App Name
    </span>

    <strong>
        SK Inventory Pro
    </strong>

</div>


<div class="setting-item">

    <span>
        Version
    </span>

    <strong>
        2.0.0
    </strong>

</div>


</section>



</main>



<script type="module" src="../js/settings.js"></script>


</body>

</html>
