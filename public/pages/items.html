<!DOCTYPE html>
<html lang="my">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>အထည်စာရင်း</title>

    <link rel="stylesheet" href="../assets/css/main.css">
    <link rel="stylesheet" href="../assets/css/items.css">
</head>

<body>

<header class="topbar">

    <h1>
        အထည်စာရင်း
    </h1>

    <button id="backBtn">
        ← ပြန်
    </button>

</header>


<main class="container">


<section class="card">

    <h2>
        အထည်အသစ် ထည့်ရန်
    </h2>


    <form id="itemForm">


        <div class="form-group">

            <label>
                Code
            </label>

            <input
                type="text"
                id="itemCode"
                placeholder="ဥပမာ A001"
                required
            >

        </div>


        <div class="form-group">

            <label>
                အထည်အမည်
            </label>

            <input
                type="text"
                id="itemName"
                placeholder="အထည်နာမည်"
            >

        </div>


        <div class="form-group">

            <label>
                Cost Price
            </label>

            <input
                type="number"
                id="costPrice"
                placeholder="ဝယ်ဈေး"
                required
            >

        </div>


        <div class="form-group">

            <label>
                Selling Price
            </label>

            <input
                type="number"
                id="sellingPrice"
                placeholder="ရောင်းဈေး"
                required
            >

        </div>


        <button
            type="submit"
            class="primary-btn">

            သိမ်းမည်

        </button>


    </form>


    <p id="itemMessage"></p>


</section>



<section>

<h2>
    အထည်များ
</h2>


<div
    id="itemList"
    class="item-list">

</div>


</section>


</main>


<script type="module" src="../js/items.js"></script>


</body>

</html>
