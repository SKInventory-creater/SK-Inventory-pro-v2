<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

    <title>SK Inventory Pro</title>

    <meta name="description" content="SK Inventory Pro Cloud Edition">
    <meta name="theme-color" content="#0F172A">

    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
</head>

<body>

<div class="login-page">

    <div class="login-card">

        <div class="logo-area">

            <div class="logo-circle">
                📦
            </div>

            <h1>
                SK Inventory Pro
            </h1>

            <p>
                Cloud Edition
            </p>

        </div>

        <form id="loginForm">

            <div class="input-group">

                <label for="email">
                    အီးမေးလ်
                </label>

                <input
                    id="email"
                    type="email"
                    placeholder="example@email.com"
                    autocomplete="email"
                    required>

            </div>

            <div class="input-group">

                <label for="password">
                    စကားဝှက်
                </label>

                <input
                    id="password"
                    type="password"
                    placeholder="********"
                    autocomplete="current-password"
                    required>

            </div>

            <div class="remember-row">

                <label class="remember-label">

                    <input
                        type="checkbox"
                        id="rememberMe">

                    <span>
                        ဝင်ရောက်မှုမှတ်ထားမည်
                    </span>

                </label>

            </div>

            <button
                id="loginButton"
                type="submit">

                ဝင်ရောက်မည်

            </button>

            <div
                id="loginMessage"
                class="message">

            </div>

        </form>
      
        <div class="login-footer">

            <p class="version">
                Version 2.0.0
            </p>

            <p class="copyright">
                © 2026 SK Inventory Pro
            </p>

        </div>

    </div>

</div>

<!-- Loading Overlay -->

<div id="loadingOverlay" class="loading-overlay hidden">

    <div class="loading-box">

        <div class="spinner"></div>

        <p>
            ကျေးဇူးပြု၍ ခဏစောင့်ပါ...
        </p>

    </div>

</div>

<!-- Firebase SDK -->

<script type="module" src="firebase/firebase-config.js"></script>
<script type="module" src="firebase/firebase-auth.js"></script>

<!-- App -->

<script type="module" src="js/app.js"></script>
<script type="module" src="js/auth.js"></script>

  <script>
document.addEventListener("DOMContentLoaded", () => {

    // Login message ကို အစမှာဖျောက်ထားမယ်
    const loginMessage = document.getElementById("loginMessage");

    if (loginMessage) {
        loginMessage.textContent = "";
    }

    // Loading Overlay ကို ပိတ်ထားမယ်
    const loadingOverlay = document.getElementById("loadingOverlay");

    if (loadingOverlay) {
        loadingOverlay.classList.add("hidden");
    }

});
</script>

</body>
</html>
